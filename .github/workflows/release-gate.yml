name: Release Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dashboard dependencies
        working-directory: platform/dashboard
        run: npm ci

      - name: Start Docker stack
        run: docker compose up -d --build postgres redis chromadb neo4j rag-service ingestion-service dashboard intelligence-service graph-service

      - name: Run release gate smoke
        run: python scripts/run_e2e_release_gate.py

      - name: Run dashboard UI smoke
        working-directory: platform/dashboard
        run: npm run smoke:ui

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200
